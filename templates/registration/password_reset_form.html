{% extends 'base1.html' %}
{% load i18n %}
{% block title %}Reset Access | HealthGuard Surveillance{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-24 px-4 relative overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-[#0F766E]/5 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-white/80 backdrop-blur-2xl p-10 rounded-[2.5rem] border border-slate-100 shadow-2xl fade-in-up">

        <div class="text-center">
            <div class="w-20 h-20 bg-[#0F766E]/10 border border-[#0F766E]/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-user-shield text-3xl text-[#0F766E]"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2 tracking-tight uppercase">
                Reset <span class="text-[#22D3EE]">Access</span>
            </h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-8">
                Initialize Secure Account Recovery
            </p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2 text-start">
                <label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-widest">
                    {% translate "Registered Surveillance Email" %}
                </label>
                <div class="relative group">
                    <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#0F766E] transition-colors"></i>
                    <input type="email" name="email" required placeholder="{% translate 'user@healthguard.gov' %}"
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-[#0F766E]/50 focus:ring-4 focus:ring-[#0F766E]/10 outline-none font-medium text-slate-900 transition-all">
                </div>
            </div>

            <button type="submit"
                class="btn-teal-glow w-full bg-[#0F766E] text-white font-bold py-4 rounded-2xl uppercase tracking-[0.2em] text-xs mt-4 transition-all shadow-lg shadow-[#0F766E]/20">
                <i class="fa-solid fa-paper-plane mr-2"></i> {% translate "Send Recovery Link" %}
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <a href="{% url 'accounts:login' %}" class="text-[9px] font-black text-slate-400 uppercase tracking-widest hover:text-[#0F766E] transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Return to Portal
            </a>
        </div>
    </div>
</div>
{% endblock %}
